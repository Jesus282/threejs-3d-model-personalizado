<!DOCTYPE html>
<html lang="es">

<head>
    <title>Mixamo Animation Controller</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Estilos -->
    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-black px-4">
        <span class="navbar-brand fw-bold">Mixamo Controller</span>
        <span class="text-secondary small">Three.js Animation Viewer</span>
    </nav>

    <!-- CONTENIDO -->
    <div class="container-fluid">
        <div class="row g-0">

            <!-- PANEL -->
            <div class="col-md-3 panel p-4">

                <h5 class="mb-4 text-uppercase text-secondary">Animaciones</h5>

                <div class="list-group">

                    <button class="list-group-item list-group-item-action" data-key="1">Sitting</button>
                    <button class="list-group-item list-group-item-action" data-key="2">Thumbs Up</button>
                    <button class="list-group-item list-group-item-action" data-key="3">Snatch</button>
                    <button class="list-group-item list-group-item-action" data-key="4">Phone</button>
                    <button class="list-group-item list-group-item-action" data-key="5">Turn</button>

                </div>

                <div class="mt-4 small text-secondary">
                    <p>Usa teclado (1–5)</p>
                    <p>o haz clic</p>
                </div>

            </div>

            <!-- VIEWER -->
            <div class="col-md-9 viewer">

                <div id="container">

                    <div id="info">
                        <strong>Three.js</strong> + Mixamo
                    </div>

                </div>

            </div>

        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        <p>Jesús — Ingeniería en Sistemas</p>
        <p class="small text-secondary mb-0">Proyecto Three.js · 2026</p>
    </footer>

    <!-- IMPORTMAP -->
    <script type="importmap">
    {
        "imports": {
            "three": "./assets/builds/three.module.js",
            "three/addons/": "./assets/jsm/"
        }
    }
    </script>

    <!-- BOTONES → JS -->
    <script>
        document.querySelectorAll('.list-group-item').forEach(btn => {
            btn.addEventListener('click', () => {
                const key = btn.dataset.key;
                window.dispatchEvent(new KeyboardEvent('keydown', { key }));
            });
        });
    </script>

    <!-- MAIN -->
    <script type="module" src="./assets/js/main.js"></script>

</body>

</html>
